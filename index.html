<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>工作备忘录 - Linda专用</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css"/>
<style>
:root{
  --bg:#F7F6F3;--bg2:#EFEDE8;--bg3:#E6E3DC;
  --surface:#FFFFFF;
  --border:#E2DED6;--border2:#D4CFC6;
  --text:#1A1917;--text2:#6B6860;--text3:#A09C96;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --accent:#3B6FD4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;transition:all .15s}
button:hover{background:var(--bg2);border-color:var(--border2)}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:#999}
textarea{resize:vertical}

.app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:10px;flex-wrap:wrap}
.app-title{font-size:22px;font-weight:600;letter-spacing:-.5px}
.app-date{font-size:13px;color:var(--text2);margin-top:2px}
.top-actions{display:flex;gap:8px;flex-shrink:0}

.stats{display:grid;gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;box-shadow:var(--shadow)}
.stat-n{font-size:22px;font-weight:600}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}

.legend-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;flex-wrap:wrap;box-shadow:var(--shadow)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.settings-link{font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.settings-link:hover{background:var(--bg2)}

/* ── Main tabs (top level: 任务 | 日历 | 笔记) ── */
.main-tabs{display:flex;gap:0;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.main-tab{flex:1;padding:10px 6px;font-size:14px;font-weight:500;border:none;border-radius:0;background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;border-right:1px solid var(--border)}
.main-tab:last-child{border-right:none}
.main-tab.active{background:var(--text);color:#fff}
.main-tab:hover:not(.active){background:var(--bg2)}

/* ── Sub-tabs (inside 任务) ── */
.sub-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.sub-tab{padding:5px 14px;border-radius:20px;font-size:13px;background:var(--surface);border:1px solid var(--border)}
.sub-tab.active{background:var(--text);color:#fff;border-color:var(--text)}

/* ── Groups & Task Cards ── */
.group{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:var(--bg2);user-select:none;transition:background .15s}
.group-hd:hover{background:var(--bg3)}
.group-arrow{font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.group-arrow.open{transform:rotate(90deg)}
.group-title{font-size:13px;font-weight:600;flex:1}
.group-cnt{font-size:11px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 7px}
.group-body.collapsed{display:none}
.task-card{border-top:1px solid var(--border);background:var(--surface);transition:background .12s}
.task-card:hover{background:var(--bg2)}
.card-inner{display:flex}
.card-accent{width:4px;flex-shrink:0}
.card-body{flex:1;padding:11px 13px;min-width:0}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-name{font-size:14px;font-weight:500;line-height:1.4}
.card-name.done{text-decoration:line-through;color:var(--text3)}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;border:none}
.b-ok{background:#E1F5EE;color:#085041}
.b-daily{background:#EEEDFE;color:#3C3489}
.b-done{background:#F0EDE7;color:#6B6860}
.card-acts{display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap}
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:6px;font-size:13px;line-height:1;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
.icon-btn:hover{color:var(--text);background:var(--bg3);border-color:var(--border2)}
.icon-btn.del:hover{color:#A32D2D;background:#FEF0F0;border-color:#f5c6c6}
.chk{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.chk.done{background:#1D9E75;border-color:#1D9E75}
.chk.done::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.meta-item.warn{color:#A32D2D}
.alert-bar{border-radius:var(--radius-xs);padding:6px 10px;font-size:12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:6px}
.docs-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.doc-chip{font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:2px 7px;color:var(--text2);display:flex;align-items:center;gap:3px}
.doc-chip.miss{border-color:#E24B4A;color:#A32D2D;background:#FEF0F0}
.note-row{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:flex-start;gap:3px}
.empty{text-align:center;padding:3rem;color:var(--text3)}
.empty i{font-size:32px;display:block;margin:0 auto 10px}

/* ── Calendar ── */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.cal-month{font-size:16px;font-weight:600}
.cal-nav{background:transparent;border:1px solid var(--border);padding:5px 12px;font-size:13px;border-radius:var(--radius-sm)}
.cal-today-btn{font-size:12px;padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:10px 0 8px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.cal-dow:first-child{color:#E24B4A}
.cal-dow:last-child{color:#5B87DC}
.cal-cell{min-height:60px;padding:6px 4px;border-top:1px solid var(--border);border-right:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;display:flex;flex-direction:column;align-items:center}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other-month .cal-day-num{color:var(--text3)}
.cal-cell.today .cal-day-num{background:var(--text);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-cell.selected{background:#EEF3FE}
.cal-cell.selected .cal-day-num{color:#1A56DB;font-weight:600}
.cal-day-num{font-size:13px;font-weight:500;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-cell:nth-child(7n+1) .cal-day-num{color:#E24B4A}
.cal-cell:nth-child(7n+1).today .cal-day-num{background:#E24B4A;color:#fff}
.cal-cell:nth-child(7n) .cal-day-num{color:#5B87DC}
.cal-cell:nth-child(7n).today .cal-day-num{background:#5B87DC;color:#fff}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px;max-width:44px}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-detail{border-top:1px solid var(--border);padding:14px 16px;background:var(--bg2)}
.cal-detail-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── Notes ── */
.notes-toolbar{display:flex;gap:8px;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap}
.notes-search{flex:1;min-width:140px}
.notes-filter-row{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-chip{padding:4px 12px;border-radius:20px;font-size:12px;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.filter-chip:hover:not(.active){background:var(--bg2)}

.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.note-card:hover{box-shadow:var(--shadow-md)}
.note-card-header{padding:12px 14px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.note-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
.note-tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 14px 0}
.note-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;display:flex;align-items:center;gap:3px}
.note-tag.vendor{background:#E8F0FE;color:#1A56DB}
.note-tag.po{background:#FEF3C7;color:#92400E}
.note-tag.custom{background:#F3E8FF;color:#6B21A8}
.note-body{padding:8px 14px 12px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-all}
.note-footer{padding:0 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.note-date{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.note-acts{display:flex;gap:5px}
.note-group-hd{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;user-select:none;transition:background .15s}
.note-group-hd:hover{background:var(--bg3)}
.note-group-title{font-size:13px;font-weight:600;flex:1}
.note-group-body.collapsed{display:none}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.1rem}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:1rem}
.type-btn{padding:8px;font-size:13px;border:none;border-radius:0;background:transparent;color:var(--text2);text-align:center}
.type-btn.active{background:var(--bg2);color:var(--text);font-weight:500}
.form-row{margin-bottom:11px}
.form-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.1rem}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333;border-color:#333}
.rule-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.rule-row input[type=color]{width:30px;height:28px;padding:2px 3px;border-radius:4px;flex-shrink:0;cursor:pointer}
.rule-row input[type=text]{flex:1}
.rule-row input[type=number]{width:52px;flex:0 0 52px}
.rule-del{background:transparent;border:none;color:var(--text3);font-size:18px;padding:0 3px;line-height:1}
.rule-del:hover{color:#A32D2D;background:transparent}
.rule-hint{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;padding:8px 10px;background:var(--bg2);border-radius:var(--radius-xs);border-left:3px solid var(--border2)}
.tags-input-wrap{display:flex;gap:6px;flex-wrap:wrap;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);min-height:38px;cursor:text}
.tags-input-wrap input{border:none;outline:none;padding:0;min-width:80px;flex:1;font-size:13px;background:transparent}
.tag-pill{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500;white-space:nowrap}
.tag-pill.vendor{background:#E8F0FE;color:#1A56DB}
.tag-pill.po{background:#FEF3C7;color:#92400E}
.tag-pill.custom{background:#F3E8FF;color:#6B21A8}
.tag-pill-del{cursor:pointer;opacity:.6;font-size:14px;line-height:1;margin-left:1px}
.tag-pill-del:hover{opacity:1}
.tag-type-row{display:flex;gap:6px;margin-bottom:8px}
.tag-type-btn{padding:3px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--text2)}
.tag-type-btn.active{border-color:currentColor}
.tag-type-btn.v.active{background:#E8F0FE;color:#1A56DB;border-color:#1A56DB}
.tag-type-btn.p.active{background:#FEF3C7;color:#92400E;border-color:#92400E}
.tag-type-btn.c.active{background:#F3E8FF;color:#6B21A8;border-color:#6B21A8}
</style>
</head>
<body>
<div class="app">
  <div class="top-row">
    <div>
      <div class="app-title">工作备忘录 · Linda专用</div>
      <div class="app-date" id="today-lbl"></div>
    </div>
    <div class="top-actions">
      <button class="settings-link" onclick="openSettings()"><i class="ti ti-settings"></i> 预警设置</button>
      <button id="new-task-btn" onclick="openModal(null)" style="display:flex;align-items:center;gap:5px"><i class="ti ti-plus"></i> 新建任务</button>
      <button id="new-note-btn" onclick="openNoteModal(null)" style="display:none;align-items:center;gap:5px"><i class="ti ti-plus"></i> 新建笔记</button>
    </div>
  </div>

  <div class="stats" id="stats-grid"></div>
  <div class="legend-bar" id="legend-bar"></div>

  <!-- Main tabs -->
  <div class="main-tabs">
    <button class="main-tab active" id="mt-tasks" onclick="setMainTab('tasks',this)"><i class="ti ti-check"></i> 任务</button>
    <button class="main-tab" id="mt-calendar" onclick="setMainTab('calendar',this)"><i class="ti ti-calendar"></i> 日历</button>
    <button class="main-tab" id="mt-notes" onclick="setMainTab('notes',this)"><i class="ti ti-notebook"></i> 笔记</button>
  </div>

  <!-- Tasks section -->
  <div id="tasks-section">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="setSubTab('all',this)">全部</button>
      <button class="sub-tab" onclick="setSubTab('alert',this)">预警中</button>
      <button class="sub-tab" onclick="setSubTab('deadline',this)">有交期</button>
      <button class="sub-tab" onclick="setSubTab('daily',this)">日常</button>
      <button class="sub-tab" onclick="setSubTab('done',this)">已完成</button>
    </div>
    <div id="task-container"></div>
  </div>

  <!-- Calendar section -->
  <div id="calendar-section" style="display:none">
    <div id="calendar-container"></div>
  </div>

  <!-- Notes section -->
  <div id="notes-section" style="display:none">
    <div class="notes-toolbar">
      <input class="notes-search" type="text" id="notes-search" placeholder="搜索笔记标题、内容、供应商、PO号…" oninput="renderNotes()"/>
      <button onclick="openNoteModal(null)" style="display:flex;align-items:center;gap:5px;flex-shrink:0"><i class="ti ti-plus"></i> 新建笔记</button>
    </div>
    <div class="notes-filter-row" id="notes-filter-row"></div>
    <div id="notes-container"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const FMT=d=>d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
const ISO=d=>{const p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
const FMTDT=iso=>{const d=new Date(iso);return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});};
document.getElementById('today-lbl').textContent=FMT(TODAY);

// ── Rules ────────────────────────────────────────────────────────────────
let rules=JSON.parse(localStorage.getItem('wm_rules')||'null')||[
  {id:1,label:'一级',days:12,color:'#639922',bgColor:'#EAF3DE',textColor:'#27500A',desc:'启动确认'},
  {id:2,label:'二级',days:7, color:'#EF9F27',bgColor:'#FAEEDA',textColor:'#633806',desc:'进度跟进'},
  {id:3,label:'三级',days:3, color:'#E24B4A',bgColor:'#FCEBEB',textColor:'#791F1F',desc:'紧急处理'},
];
let ruleNid=Math.max(0,...rules.map(r=>r.id))+1;
function saveRules(){localStorage.setItem('wm_rules',JSON.stringify(rules));}

// ── Tasks ────────────────────────────────────────────────────────────────
let tasks=JSON.parse(localStorage.getItem('wm_tasks')||'null')||[
  {id:1,type:'deadline',name:'YIHUA包材首件确认',vendor:'YIHUA',deadline:'2026-06-27',docDate:'2026-06-10',docs:['首件报告','尺寸图','外观确认书'],missing:[{name:'外观确认书',status:'待补',date:'2026-06-18'}],note:'首件确认需提前协调品质',done:false},
  {id:2,type:'deadline',name:'包材印刷色稿审核',vendor:'ABC印刷',deadline:'2026-06-08',docDate:'',docs:['色稿PDF','Pantone色卡'],missing:[{name:'Pantone色卡',status:'待补',date:'2026-06-04'}],note:'',done:false},
  {id:3,type:'daily',name:'更新季度数据表格',vendor:'',taskDate:'2026-06-02',docs:[],missing:[],note:'汇总各部门数据',done:false},
  {id:4,type:'daily',name:'周例会准备',vendor:'',taskDate:'2026-06-02',docs:[],missing:[],note:'',done:false},
];
let taskNid=Math.max(0,...tasks.map(t=>t.id))+1;
function saveTasks(){localStorage.setItem('wm_tasks',JSON.stringify(tasks));}

// ── Notes ────────────────────────────────────────────────────────────────
// tag: {type:'vendor'|'po'|'custom', value:string}
let notes=JSON.parse(localStorage.getItem('wm_notes')||'null')||[
  {id:1,title:'YIHUA 6月沟通记录',tags:[{type:'vendor',value:'YIHUA'},{type:'po',value:'PO-2026-001'}],content:'6月3日确认首件报告格式要求，对方说需要附上色差数据。\n外观确认书最迟6月18日补交，已发邮件确认。',updatedAt:'2026-06-03T10:00:00'},
  {id:2,title:'ABC印刷色稿问题',tags:[{type:'vendor',value:'ABC印刷'},{type:'po',value:'PO-2026-002'}],content:'Pantone色卡核对中，发现C面色差超标，已反馈给品质部。\n预计6月4日重新打样确认。',updatedAt:'2026-06-02T15:30:00'},
];
let noteNid=Math.max(0,...notes.map(n=>n.id))+1;
function saveNotes(){localStorage.setItem('wm_notes',JSON.stringify(notes));}

// ── Active note filter ────────────────────────────────────────────────────
let noteFilterTag=null; // null = all, else {type,value}

// ── Main tab ──────────────────────────────────────────────────────────────
let mainTab='tasks';
function setMainTab(tab,el){
  mainTab=tab;
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tasks-section').style.display=tab==='tasks'?'block':'none';
  document.getElementById('calendar-section').style.display=tab==='calendar'?'block':'none';
  document.getElementById('notes-section').style.display=tab==='notes'?'block':'none';
  document.getElementById('new-task-btn').style.display=tab==='tasks'?'flex':'none';
  document.getElementById('new-note-btn').style.display=tab==='notes'?'flex':'none';
  if(tab==='calendar') renderCalendar();
  if(tab==='notes') renderNotes();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function daysTo(iso){if(!iso)return null;return Math.round((new Date(iso+'T00:00:00')-TODAY)/864e5);}
function getAlertRule(t){
  if(t.done||t.type!=='deadline')return null;
  const d=daysTo(t.deadline);if(d===null)return null;
  const sorted=[...rules].sort((a,b)=>a.days-b.days);
  for(const r of sorted)if(d<=r.days)return r;
  return null;
}
function accentColor(t){const r=getAlertRule(t);if(r)return r.color;if(t.type==='daily')return'#AFA9EC';return'#E2DED6';}
function taskDates(t){const d=new Set();if(t.type==='deadline'&&t.deadline)d.add(t.deadline);if(t.type==='daily'&&t.taskDate)d.add(t.taskDate);if(t.docDate)d.add(t.docDate);(t.missing||[]).forEach(m=>{if(m.date)d.add(m.date);});return d;}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Stats & Legend ────────────────────────────────────────────────────────
function renderStats(){
  const sortedR=[...rules].sort((a,b)=>b.days-a.days);
  let h=`<div class="stat"><div class="stat-n">${tasks.length}</div><div class="stat-l">全部任务</div></div>`;
  sortedR.forEach(r=>{const cnt=tasks.filter(t=>{const ar=getAlertRule(t);return ar&&ar.id===r.id&&!t.done;}).length;h+=`<div class="stat"><div class="stat-n" style="color:${r.textColor}">${cnt}</div><div class="stat-l">${r.label}预警</div></div>`;});
  h+=`<div class="stat"><div class="stat-n" style="color:#3B6FD4">${notes.length}</div><div class="stat-l">笔记</div></div>`;
  const el=document.getElementById('stats-grid');
  el.style.gridTemplateColumns=`repeat(${2+sortedR.length},1fr)`;
  el.innerHTML=h;
}
function renderLegend(){
  const sorted=[...rules].sort((a,b)=>b.days-a.days);
  let h=sorted.map(r=>`<span class="leg-item"><span class="leg-dot" style="background:${r.color}"></span>${r.label}：前${r.days}天，${r.desc}</span><span style="color:var(--border2)">·</span>`).join('');
  h+=`<span class="leg-item"><span class="leg-dot" style="background:#AFA9EC"></span>日常任务</span>`;
  h+=`<button class="settings-link" style="margin-left:auto" onclick="openSettings()"><i class="ti ti-settings"></i> 自定义</button>`;
  document.getElementById('legend-bar').innerHTML=h;
}

// ── Task card ─────────────────────────────────────────────────────────────
function cardHTML(t){
  const rule=getAlertRule(t);const days=daysTo(t.deadline);
  let badge=t.done?`<span class="badge b-done">已完成</span>`:t.type==='daily'?`<span class="badge b-daily">日常</span>`:rule?`<span class="badge" style="background:${rule.bgColor};color:${rule.textColor}">${rule.label}预警</span>`:`<span class="badge b-ok">正常</span>`;
  let alertHTML='';
  if(rule&&!t.done){const hasMiss=t.missing&&t.missing.length>0;const sortedR=[...rules].sort((a,b)=>a.days-b.days);const idx=sortedR.findIndex(r=>r.id===rule.id);const msg=idx===0?`${rule.label}预警 — 距交期仅 ${days} 天，必须立刻处理${hasMiss?'，仍有缺失资料':''}！`:idx===1?`${rule.label}预警 — 距交期 ${days} 天，请跟进确认进度${hasMiss?'，有缺失资料需补齐':''}。`:`${rule.label}预警 — 距交期 ${days} 天，现在是启动确认的合适时机。`;alertHTML=`<div class="alert-bar" style="background:${rule.bgColor};color:${rule.textColor}"><i class="ti ti-alert-circle" style="font-size:14px;flex-shrink:0;margin-top:1px"></i><span>${msg}</span></div>`;}
  let metaHTML='';
  if(t.type==='deadline'){if(days!==null){const cls=days<0?'meta-item warn':'meta-item';const txt=days<0?`已逾期 ${Math.abs(days)} 天`:`交期 ${t.deadline.slice(5)} · ${days} 天后`;metaHTML+=`<span class="${cls}"><i class="ti ti-calendar"></i>${txt}</span>`;}if(t.docDate)metaHTML+=`<span class="meta-item"><i class="ti ti-file-time"></i>资料提供 ${t.docDate.slice(5)}</span>`;if(t.vendor)metaHTML+=`<span class="meta-item"><i class="ti ti-building"></i>${t.vendor}</span>`;}else{if(t.taskDate){const d=daysTo(t.taskDate);const txt=d===0?'今天':d===1?'明天':d===-1?'昨天':(d<0?`${Math.abs(d)}天前`:t.taskDate.slice(5));metaHTML+=`<span class="meta-item"><i class="ti ti-calendar"></i>${txt}</span>`;}if(t.vendor)metaHTML+=`<span class="meta-item"><i class="ti ti-building"></i>${t.vendor}</span>`;}
  let docsHTML='';
  if(t.docs&&t.docs.length){const chips=t.docs.map(d=>{const m=t.missing&&t.missing.find(x=>x.name===d);return m?`<span class="doc-chip miss"><i class="ti ti-file-x" style="font-size:11px"></i>${d}<span style="opacity:.7;margin-left:2px">(${m.status}${m.date?'·'+m.date.slice(5):''})</span></span>`:`<span class="doc-chip"><i class="ti ti-file-check" style="font-size:11px"></i>${d}</span>`;}).join('');docsHTML=`<div class="docs-row">${chips}</div>`;}
  const noteHTML=t.note?`<div class="note-row"><i class="ti ti-notes" style="font-size:12px;flex-shrink:0;margin-top:1px"></i>${escH(t.note)}</div>`:'';
  return`<div class="task-card"><div class="card-inner"><div class="card-accent" style="background:${accentColor(t)}"></div><div class="card-body"><div class="card-head"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1;min-width:0"><button class="chk${t.done?' done':''}" onclick="toggleDone(${t.id})"></button><span class="card-name${t.done?' done':''}">${escH(t.name)}</span></div><div class="card-acts">${badge}<button class="icon-btn" onclick="openModal(${t.id})"><i class="ti ti-edit"></i> 编辑</button><button class="icon-btn del" onclick="delTask(${t.id})"><i class="ti ti-trash"></i> 删除</button></div></div>${metaHTML?`<div class="meta-row">${metaHTML}</div>`:''}${alertHTML}${docsHTML}${noteHTML}</div></div></div>`;
}

// ── Task groups ───────────────────────────────────────────────────────────
const taskCollapsed={};
function toggleTaskGroup(key){taskCollapsed[key]=!taskCollapsed[key];renderTasks();}
function taskGroupKey(t){if(t.done)return'__done__';if(t.type==='daily')return'__daily__';const r=getAlertRule(t);if(r)return`__alert_${r.id}__`;return'__normal__';}
function taskGroupMeta(key){if(key==='__done__')return{label:'已完成',color:'var(--text2)',dot:'#ccc'};if(key==='__daily__')return{label:'日常任务',color:'var(--text)',dot:'#AFA9EC'};if(key==='__normal__')return{label:'有交期·正常',color:'var(--text)',dot:'#E2DED6'};const rid=parseInt(key.replace('__alert_','').replace('__',''));const r=rules.find(x=>x.id===rid);return r?{label:`${r.label}预警`,color:r.textColor,dot:r.color}:{label:'预警',color:'#666',dot:'#ccc'};}
function renderGroups(list){
  const sortedRules=[...rules].sort((a,b)=>a.days-b.days);
  const groupOrder=[...sortedRules.map(r=>`__alert_${r.id}__`),'__normal__','__daily__','__done__'];
  const groups={};list.forEach(t=>{const k=taskGroupKey(t);(groups[k]=groups[k]||[]).push(t);});
  const keys=groupOrder.filter(k=>groups[k]);Object.keys(groups).forEach(k=>{if(!keys.includes(k))keys.push(k);});
  if(!keys.length)return'<div class="empty"><i class="ti ti-clipboard-check"></i>暂无任务</div>';
  return keys.map(key=>{const meta=taskGroupMeta(key);const items=groups[key];const isOpen=taskCollapsed[key]===undefined?true:!taskCollapsed[key];return`<div class="group"><div class="group-hd" onclick="toggleTaskGroup('${key}')"><i class="ti ti-chevron-right group-arrow${isOpen?' open':''}"></i><span class="leg-dot" style="background:${meta.dot}"></span><span class="group-title" style="color:${meta.color}">${meta.label}</span><span class="group-cnt">${items.length}</span></div><div class="group-body${isOpen?'':' collapsed'}">${items.map(cardHTML).join('')}</div></div>`;}).join('');
}

let subTab='all';
function setSubTab(tab,el){subTab=tab;document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTasks();}
function renderTasks(){
  let filtered=tasks.filter(t=>{if(subTab==='done')return t.done;if(subTab==='alert')return!t.done&&!!getAlertRule(t);if(subTab==='deadline')return!t.done&&t.type==='deadline';if(subTab==='daily')return!t.done&&t.type==='daily';return true;});
  filtered.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const ra=getAlertRule(a),rb=getAlertRule(b);const da=ra?ra.days:0,db=rb?rb.days:0;if(da!==db)return db-da;return(a.deadline||a.taskDate||'').localeCompare(b.deadline||b.taskDate||'');});
  document.getElementById('task-container').innerHTML=renderGroups(filtered);
}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;saveTasks();}renderAll();}
function delTask(id){if(!confirm('确定删除这个任务？'))return;tasks=tasks.filter(x=>x.id!==id);saveTasks();renderAll();}

// ── Calendar ──────────────────────────────────────────────────────────────
let calYear=TODAY.getFullYear(),calMonth=TODAY.getMonth(),calSelected=ISO(TODAY);
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calGoToday(){calYear=TODAY.getFullYear();calMonth=TODAY.getMonth();calSelected=ISO(TODAY);renderCalendar();}
function calSelect(iso){calSelected=iso;renderCalendar();}
function buildDateMap(){const map={};tasks.forEach(t=>{taskDates(t).forEach(iso=>{if(!map[iso])map[iso]=[];const r=getAlertRule(t);map[iso].push({color:r?r.color:t.type==='daily'?'#AFA9EC':'#639922'});});});return map;}
function tasksForDate(iso){return tasks.filter(t=>taskDates(t).has(iso));}
function renderCalendar(){
  const dateMap=buildDateMap();
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startOffset=(firstDay.getDay()+6)%7;
  const monthName=new Date(calYear,calMonth,1).toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  const dows=['一','二','三','四','五','六','日'];
  let cells='';
  const totalCells=Math.ceil((startOffset+lastDay.getDate())/7)*7;
  for(let i=0;i<totalCells;i++){const dayNum=i-startOffset+1;const isThisMonth=dayNum>=1&&dayNum<=lastDay.getDate();const cellDate=new Date(calYear,calMonth,dayNum);const iso=ISO(cellDate);const isToday=iso===ISO(TODAY);const isSel=iso===calSelected;const dots=(dateMap[iso]||[]);let cls='cal-cell';if(!isThisMonth)cls+=' other-month';if(isToday)cls+=' today';if(isSel)cls+=' selected';cells+=`<div class="${cls}" onclick="calSelect('${iso}')"><span class="cal-day-num">${isThisMonth?dayNum:''}</span>${dots.length?`<div class="cal-dots">${dots.slice(0,5).map(d=>`<span class="cal-dot" style="background:${d.color}"></span>`).join('')}</div>`:''}</div>`;}
  const selTasks=tasksForDate(calSelected);
  const selLabel=new Date(calSelected+'T00:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
  let detailHTML=selTasks.length?selTasks.map(t=>{const r=getAlertRule(t);let typeTag=t.done?`<span class="badge b-done">已完成</span>`:t.type==='daily'?`<span class="badge b-daily">日常</span>`:r?`<span class="badge" style="background:${r.bgColor};color:${r.textColor}">${r.label}预警</span>`:`<span class="badge b-ok">正常</span>`;let roleLabel='';if(t.deadline===calSelected)roleLabel='📌 交期';else if(t.docDate===calSelected)roleLabel='📄 资料提供日';else if((t.missing||[]).some(m=>m.date===calSelected))roleLabel='⚠️ 资料补充日';else if(t.taskDate===calSelected)roleLabel='✅ 执行日';return`<div class="task-card" style="border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--border)"><div class="card-inner"><div class="card-accent" style="background:${accentColor(t)}"></div><div class="card-body" style="padding:8px 12px"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:space-between"><div style="display:flex;align-items:center;gap:6px"><button class="chk${t.done?' done':''}" onclick="toggleDone(${t.id})"></button><span class="card-name${t.done?' done':''}">${escH(t.name)}</span></div><div style="display:flex;gap:5px;align-items:center">${roleLabel?`<span style="font-size:11px;color:var(--text2)">${roleLabel}</span>`:''}${typeTag}</div></div></div></div></div>`;}).join(''):`<div style="text-align:center;padding:1rem;color:var(--text3);font-size:13px">该日期无任务</div>`;
  document.getElementById('calendar-container').innerHTML=`<div class="cal-wrap"><div class="cal-header"><button class="cal-nav" onclick="calPrev()">‹ 上月</button><div style="display:flex;align-items:center;gap:10px"><span class="cal-month">${monthName}</span><button class="cal-today-btn" onclick="calGoToday()">今天</button></div><button class="cal-nav" onclick="calNext()">下月 ›</button></div><div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div><div class="cal-detail"><div class="cal-detail-title"><i class="ti ti-calendar-event"></i>${selLabel} · ${selTasks.length?selTasks.length+'个任务':'无任务'}</div>${detailHTML}</div></div>`;
}

// ── Notes render ──────────────────────────────────────────────────────────
function tagHTML(tag,cls=''){
  const icons={vendor:'ti-building',po:'ti-receipt',custom:'ti-tag'};
  return`<span class="note-tag ${tag.type}${cls?(' '+cls):''}"><i class="ti ${icons[tag.type]||'ti-tag'}" style="font-size:11px"></i>${escH(tag.value)}</span>`;
}

function renderNotes(){
  const q=(document.getElementById('notes-search').value||'').toLowerCase().trim();
  // Build all unique vendor/po/custom tags for filter bar
  const allTags=[];const seen=new Set();
  notes.forEach(n=>(n.tags||[]).forEach(t=>{const k=t.type+'::'+t.value;if(!seen.has(k)){seen.add(k);allTags.push(t);}}));
  allTags.sort((a,b)=>a.type.localeCompare(b.type)||a.value.localeCompare(b.value));
  const filterHTML=`<button class="filter-chip${!noteFilterTag?' active':''}" onclick="setNoteFilter(null)">全部 (${notes.length})</button>`
    +allTags.map(t=>{const cnt=notes.filter(n=>(n.tags||[]).some(tt=>tt.type===t.type&&tt.value===t.value)).length;const isActive=noteFilterTag&&noteFilterTag.type===t.type&&noteFilterTag.value===t.value;return`<button class="filter-chip${isActive?' active':''}" onclick="setNoteFilter(${JSON.stringify(t).replace(/"/g,'&quot;')})">${tagHTML(t)} ${cnt}</button>`;}).join('');
  document.getElementById('notes-filter-row').innerHTML=filterHTML;

  let filtered=notes.filter(n=>{
    if(noteFilterTag&&!(n.tags||[]).some(t=>t.type===noteFilterTag.type&&t.value===noteFilterTag.value))return false;
    if(q){const hay=(n.title+(n.content||'')+(n.tags||[]).map(t=>t.value).join(' ')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  filtered.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));

  if(!filtered.length){document.getElementById('notes-container').innerHTML='<div class="empty"><i class="ti ti-notes"></i>暂无笔记</div>';return;}

  // Group by first vendor tag; if none, group as "未分类"
  const groups={};
  filtered.forEach(n=>{
    const vTag=(n.tags||[]).find(t=>t.type==='vendor');
    const key=vTag?vTag.value:'__未分类__';
    (groups[key]=groups[key]||[]).push(n);
  });

  const noteCollapsed_=noteCollapsed;
  let html='';
  Object.keys(groups).sort((a,b)=>a==='__未分类__'?1:b==='__未分类__'?-1:a.localeCompare(b)).forEach(key=>{
    const label=key==='__未分类__'?'未分类':key;
    const items=groups[key];
    const isOpen=noteCollapsed_[key]===undefined?true:!noteCollapsed_[key];
    const cardsHTML=items.map(n=>{
      const tags=(n.tags||[]).map(t=>tagHTML(t)).join('');
      const preview=(n.content||'').slice(0,120).replace(/\n/g,' ');
      return`<div class="note-card">
        <div class="note-card-header">
          <div class="note-title">${escH(n.title)}</div>
          <div class="note-acts">
            <button class="icon-btn" onclick="openNoteModal(${n.id})"><i class="ti ti-edit"></i> 编辑</button>
            <button class="icon-btn del" onclick="delNote(${n.id})"><i class="ti ti-trash"></i> 删除</button>
          </div>
        </div>
        ${tags?`<div class="note-tags">${tags}</div>`:''}
        <div class="note-body">${escH(preview)}${(n.content||'').length>120?'…':''}</div>
        <div class="note-footer">
          <span class="note-date"><i class="ti ti-clock" style="font-size:12px"></i>${FMTDT(n.updatedAt)}</span>
        </div>
      </div>`;
    }).join('');
    html+=`<div style="margin-bottom:16px">
      <div class="note-group-hd" onclick="toggleNoteGroup('${key}')">
        <i class="ti ti-chevron-right group-arrow${isOpen?' open':''}"></i>
        <i class="ti ti-building" style="font-size:14px;color:var(--text3)"></i>
        <span class="note-group-title">${escH(label)}</span>
        <span class="group-cnt">${items.length}</span>
      </div>
      <div class="note-group-body${isOpen?'':' collapsed'}">${cardsHTML}</div>
    </div>`;
  });
  document.getElementById('notes-container').innerHTML=html;
}
const noteCollapsed={};
function toggleNoteGroup(key){noteCollapsed[key]=!noteCollapsed[key];renderNotes();}
function setNoteFilter(tagObj){noteFilterTag=tagObj?JSON.parse(JSON.stringify(tagObj)):null;renderNotes();}
function delNote(id){if(!confirm('确定删除这条笔记？'))return;notes=notes.filter(x=>x.id!==id);saveNotes();renderAll();}

// ── Note modal ─────────────────────────────────────────────────────────────
let pendingTags=[];

function renderPendingTags(){

}
function refreshTagsWrap(){
  const wrap=document.getElementById('tags-wrap');if(!wrap)return;
  const input=document.getElementById('tag-input');const val=input?input.value:'';
  wrap.innerHTML=renderPendingTags()+`<input type="text" id="tag-input" value="${escH(val)}" placeholder="输入后按回车添加…" style="border:none;outline:none;padding:0;min-width:80px;flex:1;font-size:13px;background:transparent" onkeydown="handleTagInput(event)"/>`;
  document.getElementById('tag-input').focus();
}
function removePendingTag(i){pendingTags.splice(i,1);refreshTagsWrap();}
function setTagType(tp){
  pendingTagType=tp;
  ['vendor','po','custom'].forEach(t=>{const btn=document.getElementById('tt-'+t);if(btn){btn.classList.toggle('active',t===tp);}});
}
function handleTagInput(e){
  if(e.key==='Enter'){e.preventDefault();const val=(document.getElementById('tag-input').value||'').trim();if(!val)return;pendingTags.push({type:pendingTagType,value:val});document.getElementById('tag-input').value='';refreshTagsWrap();}
  if(e.key==='Backspace'&&!document.getElementById('tag-input').value&&pendingTags.length){pendingTags.pop();refreshTagsWrap();}
}
function openNoteModal(id){
  const n=id?notes.find(x=>x.id===id):null;
  document.getElementById('modal-root').innerHTML=buildNoteModal(n);
}
function saveNote(rawId){
  const title=(document.getElementById('nf-title').value||'').trim();if(!title)return;
  const content=document.getElementById('nf-content').value||'';
  const obj={id:rawId&&rawId!='null'?+rawId:noteNid++,title,tags:JSON.parse(JSON.stringify(pendingTags)),content,updatedAt:new Date().toISOString()};
  if(rawId&&rawId!='null'){const i=notes.findIndex(x=>x.id===+rawId);if(i>=0)notes[i]=obj;}else notes.push(obj);
  saveNotes();closeModal();renderAll();
}

// ── Task modal ─────────────────────────────────────────────────────────────
let formType='daily';
function buildTaskModal(t){
  const isEdit=!!t;const tp=isEdit?t.type:formType;
  const defDL=ISO(new Date(TODAY.getTime()+20*864e5));
  return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-title">${isEdit?'编辑任务':'新建任务'}</div>
    <div class="type-toggle">
      <button class="type-btn${tp==='deadline'?' active':''}" id="tbtn-dl" onclick="switchType('deadline')"><i class="ti ti-calendar-due"></i> 有交期任务</button>
      <button class="type-btn${tp==='daily'?' active':''}" id="tbtn-dy" onclick="switchType('daily')"><i class="ti ti-list-check"></i> 日常任务</button>
    </div>
    <div class="form-row"><label>任务名称</label><input type="text" id="f-name" value="${isEdit?escH(t.name):''}" placeholder="任务名称"/></div>
    <div class="form-row"><label>供应商 / 项目（可选）</label><input type="text" id="f-vendor" value="${isEdit?escH(t.vendor||''):''}" placeholder="如：YIHUA"/></div>
    <div id="deadline-fields" style="display:${tp==='deadline'?'block':'none'}">
      <div class="form-row"><label>交期</label><input type="date" id="f-deadline" value="${isEdit&&t.deadline?t.deadline:defDL}"/></div>
      <div class="form-row"><label>资料提供时间（可选）</label><input type="date" id="f-doc-date" value="${isEdit?t.docDate||'':''}"/></div>
      <div class="form-row"><label>所需资料（逗号分隔）</label><input type="text" id="f-docs" value="${isEdit?(t.docs||[]).join(','):''}" placeholder="首件报告,尺寸图,外观确认书"/></div>
      <div class="form-row"><label>缺失资料及补充时间</label><input type="text" id="f-missing" value="${isEdit?(t.missing||[]).map(m=>`${m.name}(${m.status}${m.date?','+m.date:''})`).join(','):''}" placeholder="外观确认书(待补,6-18)"/></div>
    </div>
    <div id="daily-fields" style="display:${tp==='daily'?'block':'none'}">
      <div class="form-row"><label>执行日期</label><input type="date" id="f-task-date" value="${isEdit&&t.taskDate?t.taskDate:ISO(TODAY)}"/></div>
    </div>
    <div class="form-row"><label>备注（可选）</label><textarea id="f-note">${isEdit?escH(t.note||''):''}</textarea></div>
    <div class="modal-footer"><button onclick="closeModal()">取消</button><button class="btn-primary" onclick="saveTask(${isEdit?t.id:'null'})">保存</button></div>
  </div></div>`;
}
function switchType(tp){formType=tp;document.getElementById('tbtn-dl').classList.toggle('active',tp==='deadline');document.getElementById('tbtn-dy').classList.toggle('active',tp==='daily');document.getElementById('deadline-fields').style.display=tp==='deadline'?'block':'none';document.getElementById('daily-fields').style.display=tp==='daily'?'block':'none';}
function openModal(id){const t=id?tasks.find(x=>x.id===id):null;formType=t?t.type:'daily';document.getElementById('modal-root').innerHTML=buildTaskModal(t);}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function parseMissing(str){if(!str||!str.trim())return[];return str.split(',').map(s=>{s=s.trim();const m=s.match(/^(.+?)\(([^,)]+)(?:,([^)]+))?\)$/);return m?{name:m[1].trim(),status:m[2].trim(),date:m[3]?m[3].trim():''}:{name:s,status:'待补',date:''};}).filter(x=>x.name);}
function saveTask(rawId){
  const name=(document.getElementById('f-name').value||'').trim();if(!name)return;
  const tp=formType;
  const obj={id:rawId&&rawId!='null'?+rawId:taskNid++,type:tp,name,vendor:(document.getElementById('f-vendor').value||'').trim(),deadline:tp==='deadline'?(document.getElementById('f-deadline').value||''):'',docDate:tp==='deadline'?(document.getElementById('f-doc-date').value||''):'',docs:tp==='deadline'?((document.getElementById('f-docs').value||'').split(',').map(s=>s.trim()).filter(Boolean)):[],missing:tp==='deadline'?parseMissing(document.getElementById('f-missing').value):[],taskDate:tp==='daily'?(document.getElementById('f-task-date').value||''):'',note:(document.getElementById('f-note').value||'').trim(),done:false};
  if(rawId&&rawId!='null'){const i=tasks.findIndex(x=>x.id===+rawId);if(i>=0){obj.done=tasks[i].done;tasks[i]=obj;}}else tasks.push(obj);
  saveTasks();closeModal();renderAll();
}

// ── Settings ───────────────────────────────────────────────────────────────
function buildSettingsModal(){
  const rows=rules.map(r=>`<div class="rule-row"><input type="color" value="${r.color}" oninput="liveUpdateRule(${r.id},'color',this.value)" title="颜色"/><input type="text" value="${escH(r.label)}" onchange="liveUpdateRule(${r.id},'label',this.value)" placeholder="名称" style="max-width:60px"/><span style="font-size:12px;color:var(--text2);white-space:nowrap">前</span><input type="number" value="${r.days}" min="1" max="999" onchange="liveUpdateRule(${r.id},'days',+this.value)" style="max-width:55px"/><span style="font-size:12px;color:var(--text2);white-space:nowrap">天</span><input type="text" value="${escH(r.desc)}" onchange="liveUpdateRule(${r.id},'desc',this.value)" placeholder="说明"/><button class="rule-del" onclick="delRule(${r.id})">×</button></div>`).join('');
  return`<div class="overlay" onclick="if(event.target===this)closeSettings()"><div class="modal"><div class="modal-title">自定义预警规则</div><div class="rule-hint">每一级在"距交期 ≤ N 天"时自动触发。可以增减级别、调整天数和颜色。保存后所有任务立即生效。</div><div id="rules-list">${rows}</div><button onclick="addRule()" style="width:100%;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:5px"><i class="ti ti-plus"></i> 添加预警级别</button><div class="modal-footer"><button onclick="closeSettings()">完成</button></div></div></div>`;
}
function openSettings(){document.getElementById('modal-root').innerHTML=buildSettingsModal();}
function closeSettings(){saveRules();document.getElementById('modal-root').innerHTML='';renderAll();}
function liveUpdateRule(id,field,val){const r=rules.find(x=>x.id===id);if(!r)return;r[field]=val;if(field==='color'){r.bgColor=hexToLightBg(val);r.textColor=hexToDark(val);}}
function delRule(id){if(rules.length<=1){alert('至少保留一条预警规则');return;}rules=rules.filter(x=>x.id!==id);document.getElementById('modal-root').innerHTML=buildSettingsModal();renderAll();}
function addRule(){rules.push({id:ruleNid++,label:`${rules.length+1}级`,days:Math.max(...rules.map(r=>r.days))+7,color:'#888888',bgColor:'rgba(136,136,136,0.12)',textColor:'#555555',desc:'自定义提醒'});document.getElementById('modal-root').innerHTML=buildSettingsModal();renderAll();}
function hexToLightBg(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},0.13)`;}
function hexToDark(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const lum=(0.299*r+0.587*g+0.114*b)/255;return lum>0.55?`#${[r,g,b].map(x=>Math.max(0,Math.floor(x*0.45)).toString(16).padStart(2,'0')).join('')}`:hex;}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll(){
  renderStats();renderLegend();renderTasks();
  if(mainTab==='calendar') renderCalendar();
  if(mainTab==='notes') renderNotes();
}

renderAll();
</script>
</body>
</html>
